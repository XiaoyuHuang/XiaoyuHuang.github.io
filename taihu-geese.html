<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太湖鹅群 — 吴冠中</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; overflow: hidden; width: 100vw; height: 100vh; }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }
    .ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
    }
    .back {
      pointer-events: all;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      align-self: flex-start;
      transition: color 0.2s;
    }
    .back:hover { color: rgba(255,255,255,0.9); }
    .title-block { margin-top: auto; }
    h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.12em;
      text-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }
    .attribution {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      margin-top: 5px;
      letter-spacing: 0.15em;
    }
    #hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.75);
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(6px);
      padding: 8px 22px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
      transition: opacity 0.6s;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <a href="/" class="back">← 返回 / Back</a>
  <div class="title-block">
    <h1>太湖鹅群</h1>
    <p class="attribution">吴冠中 · Wu Guanzhong</p>
  </div>
</div>
<div id="hint">点击画面唤醒鹅群 · Click to awaken</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, waterY;
let bg; // offscreen background canvas
let geese = [];
let animated = false;
let raf;

// ── Resize ──────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  waterY = H * 0.28;
  buildBg();
  buildGeese();
}

// ── Background (painted once to offscreen canvas) ────────────────
function buildBg() {
  bg = document.createElement('canvas');
  bg.width = W; bg.height = H;
  const c = bg.getContext('2d');

  // Cream sky
  const sky = c.createLinearGradient(0, 0, 0, waterY * 1.1);
  sky.addColorStop(0, '#dde5e8');
  sky.addColorStop(1, '#c8d5db');
  c.fillStyle = sky;
  c.fillRect(0, 0, W, H);

  // Faint distant hills
  c.beginPath();
  c.moveTo(0, waterY);
  c.bezierCurveTo(W*0.15, waterY-38, W*0.35, waterY-22, W*0.55, waterY-30);
  c.bezierCurveTo(W*0.72, waterY-42, W*0.88, waterY-18, W, waterY);
  c.closePath();
  c.fillStyle = 'rgba(110,140,130,0.18)';
  c.fill();

  // Water body
  const water = c.createLinearGradient(0, waterY, 0, H);
  water.addColorStop(0,   '#a8c2cc');
  water.addColorStop(0.45,'#92afbc');
  water.addColorStop(1,   '#7a9dac');
  c.fillStyle = water;
  c.fillRect(0, waterY, W, H - waterY);

  // Shoreline stroke
  c.beginPath();
  c.moveTo(0, waterY); c.lineTo(W, waterY);
  c.strokeStyle = 'rgba(70,100,90,0.35)';
  c.lineWidth = 1.2;
  c.stroke();

  // Water shimmer
  c.globalAlpha = 0.1;
  for (let i = 0; i < 90; i++) {
    const y   = waterY + 5 + Math.random() * (H - waterY - 10);
    const x   = Math.random() * W;
    const len = 18 + Math.random() * 90;
    c.beginPath();
    c.moveTo(x, y); c.lineTo(x + len, y);
    c.strokeStyle = 'white';
    c.lineWidth = 0.7;
    c.stroke();
  }
  c.globalAlpha = 1;

  // Lotus leaves
  for (let i = 0; i < 10; i++) {
    const lx = 30 + Math.random() * (W - 60);
    const ly = waterY + 20 + Math.random() * (H - waterY - 40);
    const lr = 14 + Math.random() * 22;
    c.beginPath();
    c.arc(lx, ly, lr, 0, Math.PI * 2);
    c.fillStyle   = `rgba(55,90,60,${0.08 + Math.random() * 0.1})`;
    c.strokeStyle = `rgba(55,90,60,${0.25 + Math.random() * 0.2})`;
    c.lineWidth   = 1.2;
    c.fill(); c.stroke();
    // Leaf vein
    c.beginPath();
    c.moveTo(lx, ly); c.lineTo(lx + lr * 0.7, ly - lr * 0.5);
    c.strokeStyle = `rgba(55,90,60,0.15)`;
    c.lineWidth   = 0.6;
    c.stroke();
  }

  // Reeds left
  reeds(c, 0,   18);
  // Reeds right
  reeds(c, W,   14);
  // Scattered interior reeds
  reeds(c, W * 0.22, 4);
  reeds(c, W * 0.68, 6);

  // Wu Guanzhong signature red/orange dots
  const dotColors = ['#be1a1a','#cc2a10','#d43a08','#c82818','#d44a10'];
  for (let i = 0; i < 32; i++) {
    const dx = 20 + Math.random() * (W - 40);
    const dy = waterY + 8 + Math.random() * (H - waterY - 16);
    const dr = 1.8 + Math.random() * 4.5;
    c.beginPath();
    c.arc(dx, dy, dr, 0, Math.PI * 2);
    c.fillStyle   = dotColors[i % dotColors.length];
    c.globalAlpha = 0.4 + Math.random() * 0.55;
    c.fill();
  }
  c.globalAlpha = 1;
}

function reeds(c, bx, n) {
  const dir = bx === 0 ? 1 : -1;
  for (let i = 0; i < n; i++) {
    const rx  = bx + dir * (8 + Math.random() * 110);
    const bot = waterY + 10 + Math.random() * (H - waterY - 30) * 0.65;
    const h   = 55 + Math.random() * 160;
    const tx  = rx + (Math.random() - 0.5) * 28;
    const ty  = bot - h;
    c.beginPath();
    c.moveTo(rx, bot);
    c.quadraticCurveTo(rx + (Math.random()-0.5)*18, bot - h*0.5, tx, ty);
    const g = Math.floor(65 + Math.random()*30);
    c.strokeStyle = `rgba(40,${g},35,${0.55 + Math.random()*0.4})`;
    c.lineWidth   = 0.8 + Math.random() * 2;
    c.stroke();
    if (Math.random() > 0.35) {
      c.beginPath();
      c.ellipse(tx, ty + 6, 2.5, 9, (Math.random()-0.5)*0.5, 0, Math.PI*2);
      c.fillStyle = `rgba(75,45,15,${0.55+Math.random()*0.4})`;
      c.fill();
    }
  }
}

// ── Draw a single goose ──────────────────────────────────────────
// neckBob: -1 (drinking/down) → 0 (neutral) → 1 (alert/up)
// facing:  true = right, false = left
function drawGoose(cx, cy, sc, facing, neckBob, wingFlap) {
  ctx.save();
  ctx.translate(cx, cy);
  if (!facing) ctx.scale(-1, 1);
  ctx.scale(sc, sc);

  const bw = 22, bh = 13;

  // ── Water reflection (squished ellipse below) ──
  ctx.save();
  ctx.scale(1, 0.28);
  ctx.beginPath();
  ctx.ellipse(0, (bh + 8) / 0.28, bw * 0.82, bh * 0.6, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(80,120,145,0.2)';
  ctx.fill();
  ctx.restore();

  // ── Wing flap (behind body) ──
  if (wingFlap > 0.04) {
    ctx.beginPath();
    ctx.ellipse(-2, -bh - wingFlap * 13, bw * 0.72, 5 + wingFlap * 4, -0.18, 0, Math.PI * 2);
    ctx.fillStyle   = '#ededea';
    ctx.strokeStyle = '#333';
    ctx.lineWidth   = 1;
    ctx.fill(); ctx.stroke();
  }

  // ── Body ──
  ctx.beginPath();
  ctx.ellipse(0, 0, bw, bh, 0, 0, Math.PI * 2);
  ctx.fillStyle   = '#f5f5f2';
  ctx.fill();
  ctx.strokeStyle = '#1c1c1c';
  ctx.lineWidth   = 1.8;
  ctx.stroke();

  // Wing fold crease
  ctx.beginPath();
  ctx.moveTo(-11, -bh + 2);
  ctx.quadraticCurveTo(2, -bh - 3, bw - 7, -bh + 3);
  ctx.strokeStyle = 'rgba(100,100,100,0.4)';
  ctx.lineWidth   = 0.9;
  ctx.stroke();

  // ── Tail ──
  ctx.beginPath();
  ctx.moveTo(-bw + 2, -4);
  ctx.lineTo(-bw - 14, -3);
  ctx.lineTo(-bw - 12,  0);
  ctx.lineTo(-bw - 14,  4);
  ctx.lineTo(-bw + 2,   3);
  ctx.fillStyle   = '#eeeeeb';
  ctx.fill();
  ctx.strokeStyle = '#1c1c1c';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // ── Neck + Head ──
  // Map neckBob (-1..1) to head position
  const t  = (neckBob + 1) / 2;          // 0 = drinking, 1 = alert
  const hx = bw + 20 - t * 12;           // 40→28 as t goes 0→1
  const hy = 16 - t * 52;                // +16 (water) → -36 (high)
  const cpx = bw + 15 - t * 5;
  const cpy = -2 - t * 18;
  const nsx = bw - 4, nsy = -bh + 4;

  // Neck: black outline then white fill
  const path = () => {
    ctx.beginPath();
    ctx.moveTo(nsx, nsy);
    ctx.quadraticCurveTo(cpx, cpy, hx, hy);
  };
  path(); ctx.strokeStyle = '#1c1c1c'; ctx.lineWidth = 9;  ctx.lineCap = 'round'; ctx.stroke();
  path(); ctx.strokeStyle = '#f5f5f2'; ctx.lineWidth = 6;  ctx.stroke();

  // Head
  ctx.beginPath();
  ctx.arc(hx, hy, 7.5, 0, Math.PI * 2);
  ctx.fillStyle   = '#f5f5f2';
  ctx.fill();
  ctx.strokeStyle = '#1c1c1c';
  ctx.lineWidth   = 1.6;
  ctx.stroke();

  // Beak
  ctx.beginPath();
  ctx.moveTo(hx + 5,  hy - 1);
  ctx.lineTo(hx + 16, hy + 1);
  ctx.lineTo(hx + 14, hy + 4);
  ctx.lineTo(hx + 4,  hy + 3);
  ctx.closePath();
  ctx.fillStyle   = '#c84000';
  ctx.fill();
  ctx.strokeStyle = '#882000';
  ctx.lineWidth   = 0.8;
  ctx.stroke();
  // Beak groove
  ctx.beginPath();
  ctx.moveTo(hx + 7, hy + 0.5);
  ctx.lineTo(hx + 14, hy + 2);
  ctx.strokeStyle = 'rgba(130,40,0,0.5)';
  ctx.lineWidth   = 0.6;
  ctx.stroke();

  // Eye
  ctx.beginPath();
  ctx.arc(hx + 1, hy - 2, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#111'; ctx.fill();
  ctx.beginPath();
  ctx.arc(hx + 1.8, hy - 2.8, 0.9, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fill();

  ctx.restore();
}

// ── Goose entity ─────────────────────────────────────────────────
class Goose {
  constructor() {
    this.x      = 80 + Math.random() * (W - 160);
    this.y      = waterY + 55 + Math.random() * (H - waterY - 110);
    this.sc     = 0.6 + Math.random() * 0.65;
    this.facing = Math.random() > 0.5;
    this.speed  = (0.3 + Math.random() * 0.55) * this.sc;
    this.vx     = (this.facing ? 1 : -1) * this.speed;
    this.vy     = (Math.random() - 0.5) * this.speed * 0.35;
    this.tvx    = this.vx;
    this.tvy    = this.vy;
    this.phase  = Math.random() * Math.PI * 2;
    this.pspd   = 0.018 + Math.random() * 0.012;
    this.dphase = Math.random() * Math.PI * 2;
    this.drink  = Math.random() < 0.18;
    this.neckBob = this.drink ? Math.sin(this.dphase) * 0.85 : Math.sin(this.phase) * 0.4;
    this.wingFlap = 0;
    this.timer  = 120 + Math.random() * 280;
  }

  update() {
    if (!animated) return;

    this.phase  += this.pspd;
    this.dphase += 0.014;
    this.timer--;

    if (this.timer <= 0) {
      this.timer = 140 + Math.random() * 320;
      if (Math.random() < 0.35) {
        this.facing = !this.facing;
      }
      this.tvx = (this.facing ? 1 : -1) * this.speed * (0.7 + Math.random() * 0.6);
      this.tvy = (Math.random() - 0.5) * this.speed * 0.5;
      if (Math.random() < 0.08) this.wingFlap = 1;
    }

    this.vx += (this.tvx - this.vx) * 0.06;
    this.vy += (this.tvy - this.vy) * 0.06;
    this.x  += this.vx;
    this.y  += this.vy;
    this.wingFlap = Math.max(0, this.wingFlap - 0.018);

    // Boundary
    const m = 55;
    if (this.x < m)     { this.tvx =  Math.abs(this.tvx); this.facing = true;  }
    if (this.x > W - m) { this.tvx = -Math.abs(this.tvx); this.facing = false; }
    if (this.y < waterY + m) { this.tvy =  Math.abs(this.tvy); }
    if (this.y > H - m)      { this.tvy = -Math.abs(this.tvy); }

    this.neckBob = this.drink
      ? Math.sin(this.dphase) * 0.88
      : Math.sin(this.phase)  * 0.38;
  }

  draw() {
    drawGoose(this.x, this.y, this.sc, this.facing, this.neckBob, this.wingFlap);
  }
}

// ── Build geese ──────────────────────────────────────────────────
function buildGeese() {
  geese = [];
  const n = 20 + Math.floor(Math.random() * 8);
  for (let i = 0; i < n; i++) geese.push(new Goose());
}

// ── Render loop ──────────────────────────────────────────────────
function loop() {
  geese.forEach(g => g.update());

  ctx.drawImage(bg, 0, 0);

  // Draw back-to-front (by y)
  [...geese].sort((a, b) => a.y - b.y).forEach(g => g.draw());

  raf = requestAnimationFrame(loop);
}

// ── Toggle ───────────────────────────────────────────────────────
canvas.addEventListener('click', () => {
  animated = !animated;
  document.getElementById('hint').textContent = animated
    ? '再次点击让鹅群静止 · Click to freeze'
    : '点击画面唤醒鹅群 · Click to awaken';
});

// ── Boot ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => { resize(); });
resize();
loop();
</script>
</body>
</html>
